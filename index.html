<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>腾讯视频播放页模拟</title>
    <style>
      :root {
        --white: #fff;
        --muted: rgba(255, 255, 255, 0.52);
        --track: rgba(255, 255, 255, 0.44);
        --track-active: rgba(255, 255, 255, 0.96);
        --panel: rgba(24, 24, 24, 0.92);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
        color: var(--white);
        font-family:
          "PingFang SC",
          "Microsoft YaHei",
          "Hiragino Sans GB",
          Arial,
          sans-serif;
      }

      button {
        border: 0;
        padding: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        cursor: pointer;
      }

      .player-page {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #000;
      }

      .player-shell {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #000;
        --control-scale: 1;
      }

      .player-shell.ad-mode .player-chrome {
        pointer-events: none;
      }

      .video-layer {
        position: absolute;
        inset: 0;
        background: #000;
      }

      .video-layer video {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        background: #000;
      }

      .ad-layer {
        position: absolute;
        inset: 0;
        z-index: 3;
        display: none;
        overflow: hidden;
        background: transparent;
        color: #fff;
      }

      .ad-layer.active {
        display: block;
      }

      .ai-prehint {
        position: absolute;
        left: clamp(24px, 4vw, 72px);
        bottom: clamp(126px, 12vw, 196px);
        z-index: 6;
        display: none;
        align-items: center;
        gap: 12px;
        max-width: min(520px, calc(100vw - 48px));
        padding: 13px 16px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.62);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
        color: rgba(255, 255, 255, 0.92);
        font-size: clamp(14px, 1.2vw, 22px);
        font-weight: 800;
        opacity: 0;
        pointer-events: none;
        transform: translateY(10px);
        transition:
          opacity 0.18s ease,
          transform 0.18s ease;
      }

      .ai-prehint.active {
        display: flex;
        opacity: 1;
        transform: translateY(0);
      }

      .ai-prehint-dot {
        flex: 0 0 auto;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #00f0ff;
        box-shadow: 0 0 18px #00f0ff;
      }

      .ad-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.54);
        backdrop-filter: blur(1px);
      }

      .ad-scan {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.2), transparent),
          linear-gradient(180deg, transparent 0 47%, rgba(0, 240, 255, 0.42) 50%, transparent 53%),
          repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.06) 0 1px, transparent 1px 12px);
        mix-blend-mode: screen;
        opacity: 0.72;
        transform: translateX(-45%);
        animation: adScan 2.2s ease-in-out 0.2s both;
      }

      .ad-content {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        align-items: center;
        gap: clamp(28px, 4vw, 76px);
        padding: clamp(30px, 4vw, 72px);
        padding-top: clamp(48px, 5vw, 86px);
        padding-bottom: clamp(118px, 13vh, 148px);
      }

      .ad-step {
        display: none;
      }

      .ad-step.active {
        display: block;
      }

      .ad-step.active.ad-step-split {
        display: grid;
        grid-template-columns: minmax(560px, min(74vw, 900px));
        align-items: center;
        justify-content: center;
      }

      .ad-step.active.ad-step-split > :first-child {
        display: none;
      }

      .ad-kicker {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        gap: 10px;
        margin-bottom: clamp(10px, 1.2vw, 18px);
        padding: 9px 14px;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.38);
        color: rgba(255, 255, 255, 0.86);
        font-size: clamp(14px, 1.22vw, 23px);
        font-weight: 700;
      }

      .ad-kicker::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #00f0ff;
        box-shadow: 0 0 18px #00f0ff;
      }

      .ad-title {
        max-width: 820px;
        margin: 0;
        font-size: clamp(34px, 4.55vw, 76px);
        font-weight: 900;
        line-height: 1.02;
        letter-spacing: 0;
      }

      .ad-title span {
        color: #50f0c8;
      }

      .ad-copy {
        max-width: 680px;
        margin: clamp(14px, 1.6vw, 22px) 0 0;
        color: rgba(255, 255, 255, 0.82);
        font-size: clamp(17px, 1.55vw, 28px);
        font-weight: 700;
        line-height: 1.32;
      }

      .ad-detections {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: clamp(16px, 2vw, 26px);
      }

      .ad-detections span {
        padding: 8px 12px;
        border-radius: 4px;
        background: rgba(0, 240, 255, 0.14);
        color: rgba(255, 255, 255, 0.9);
        font-size: clamp(13px, 1vw, 18px);
        font-weight: 800;
      }

      .ad-generating {
        max-width: 760px;
      }

      .ad-loader {
        position: relative;
        width: min(560px, 72vw);
        height: 8px;
        margin-top: 30px;
        overflow: hidden;
        border-radius: 99px;
        background: rgba(255, 255, 255, 0.16);
      }

      .ad-loader::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 42%;
        border-radius: inherit;
        background: #50f0c8;
        animation: adLoader 1.1s ease-in-out infinite alternate;
      }

      .ad-card {
        position: relative;
        align-self: center;
        width: min(74vw, 900px);
        justify-self: center;
        padding: clamp(14px, 1.6vw, 22px);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: rgba(9, 13, 14, 0.76);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(14px);
      }

      .ad-card::before {
        content: "AI剧情广告";
        position: absolute;
        left: 18px;
        top: 18px;
        z-index: 3;
        padding: 7px 10px;
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.68);
        color: #50f0c8;
        font-size: 14px;
        font-weight: 900;
        pointer-events: none;
      }

      .ad-card-link {
        position: absolute;
        inset: 0;
        display: none;
      }

      .ad-card-link-text {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
      }

      .ad-media {
        position: relative;
        overflow: hidden;
        border-radius: 6px;
        background: #111;
      }

      .ad-card img,
      .ad-card video {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        display: block;
      }

      .ad-card video {
        display: none;
      }

      .ad-film-overlay {
        display: none;
      }

      .ad-card.video-mode .ad-card-image {
        display: none;
      }

      .ad-card.video-mode .ad-card-video {
        display: block;
      }

      .ad-card.video-mode .ad-film-overlay {
        position: absolute;
        inset: 0;
        display: grid;
        align-content: end;
        gap: 8px;
        padding: 14px;
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.7)),
          linear-gradient(90deg, rgba(217, 56, 30, 0.28), transparent 62%);
        pointer-events: none;
      }

      .ad-film-badge {
        width: fit-content;
        padding: 5px 8px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.9);
        color: #d9381e;
        font-size: clamp(12px, 0.9vw, 15px);
        font-weight: 900;
      }

      @keyframes aiAdFilmPan {
        0% {
          transform: scale(1.08) translateX(1.5%);
          filter: saturate(1.08) contrast(1.04);
        }

        34% {
          transform: scale(1.14) translateX(-2.2%);
          filter: saturate(1.16) contrast(1.06);
        }

        68% {
          transform: scale(1.1) translateX(-5%);
          filter: saturate(1.1) contrast(1.08);
        }

        100% {
          transform: scale(1.03) translateX(-6.5%);
          filter: saturate(1.02) contrast(1);
        }
      }

      .ad-film-title {
        color: #fff;
        font-size: clamp(20px, 1.65vw, 30px);
        font-weight: 900;
        line-height: 1.08;
        text-shadow: 0 2px 14px rgba(0, 0, 0, 0.42);
      }

      .ad-film-pack {
        width: fit-content;
        padding: 7px 10px;
        border: 1px solid rgba(255, 255, 255, 0.42);
        border-radius: 5px;
        background: rgba(255, 248, 238, 0.92);
        color: #201714;
        font-size: clamp(12px, 0.92vw, 16px);
        font-weight: 900;
      }

      .ad-brand {
        margin-top: 12px;
        color: #50f0c8;
        font-size: clamp(13px, 1vw, 18px);
        font-weight: 900;
      }

      .ad-product {
        margin-top: 5px;
        font-size: clamp(20px, 1.55vw, 28px);
        font-weight: 900;
        line-height: 1.1;
      }

      .ad-offer {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 12px;
      }

      .ad-price {
        font-size: clamp(24px, 1.8vw, 34px);
        font-weight: 900;
      }
      .ad-scene-tags {
        position: absolute;
        right: clamp(24px, 5vw, 86px);
        top: 48%;
        z-index: 4;
        display: none;
        width: min(340px, 31vw);
        transform: translateY(-50%);
        pointer-events: none;
      }

      .ad-layer.scanning .ad-scene-tags {
        display: grid;
        gap: 12px;
      }

      .scene-tag {
        width: fit-content;
        padding: 10px 13px;
        border: 1px solid rgba(80, 240, 200, 0.36);
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.58);
        color: rgba(255, 255, 255, 0.92);
        font-size: clamp(14px, 1.18vw, 20px);
        font-weight: 900;
        opacity: 0;
        transform: translateX(-18px);
        animation: sceneTagIn 0.42s ease forwards;
      }

      .scene-tag:nth-child(2) {
        margin-left: 26px;
        animation-delay: 0.18s;
      }

      .scene-tag:nth-child(3) {
        margin-left: 52px;
        animation-delay: 0.36s;
      }

      .scene-tag::before {
        content: "";
        display: inline-block;
        width: 8px;
        height: 8px;
        margin-right: 9px;
        border-radius: 50%;
        background: #50f0c8;
        box-shadow: 0 0 14px #50f0c8;
        vertical-align: 1px;
      }

      .ad-cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 108px;
        padding: 9px 16px;
        border-radius: 4px;
        background: #fff;
        color: #111;
        font-size: clamp(14px, 1vw, 18px);
        font-weight: 900;
        text-align: center;
        text-decoration: none;
        position: relative;
        z-index: 4;
      }

      .ad-end {
        max-width: 620px;
        padding: clamp(18px, 2.2vw, 32px);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        background: rgba(7, 10, 11, 0.78);
        box-shadow: 0 28px 70px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(14px);
      }

      .ad-end-title {
        margin: 0;
        font-size: clamp(30px, 3.6vw, 58px);
        font-weight: 900;
        line-height: 1.05;
      }

      .ad-end-copy {
        margin: 12px 0 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: clamp(16px, 1.28vw, 23px);
        font-weight: 700;
        line-height: 1.35;
      }

      .ad-end-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 14px;
        margin-top: 18px;
      }

      .ad-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 20px;
        border-radius: 4px;
        background: #fff;
        color: #101010;
        font-size: clamp(15px, 1.14vw, 21px);
        font-weight: 900;
        text-decoration: none;
      }

      .ad-secondary {
        min-height: 44px;
        padding: 0 18px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 4px;
        color: rgba(255, 255, 255, 0.9);
        font-size: clamp(15px, 1.14vw, 21px);
        font-weight: 900;
      }

      .ad-meta {
        position: absolute;
        top: clamp(18px, 2.2vw, 38px);
        right: clamp(18px, 2.2vw, 38px);
        display: flex;
        align-items: center;
        gap: 14px;
        z-index: 4;
      }

      .ad-countdown,
      .ad-skip,
      .ad-exit {
        height: 36px;
        padding: 0 13px;
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.58);
        color: rgba(255, 255, 255, 0.9);
        font-size: 15px;
        font-weight: 800;
        line-height: 36px;
      }

      .ad-skip {
        border: 1px solid rgba(255, 255, 255, 0.28);
      }

      .ad-exit {
        display: none;
        border: 1px solid rgba(255, 255, 255, 0.28);
      }

      .ad-layer.end-state .ad-exit {
        display: inline-block;
      }

      .ad-layer.end-state .ad-skip {
        display: none;
      }

      .ad-skip[disabled] {
        opacity: 0.46;
        cursor: default;
      }

      @keyframes adDrift {
        from {
          transform: scale(1.08) translateX(-1.5%);
        }
        to {
          transform: scale(1.14) translateX(1.8%);
        }
      }

      @keyframes adScan {
        0% {
          opacity: 0;
          transform: translateX(-50%);
        }
        22% {
          opacity: 0.8;
        }
        100% {
          opacity: 0;
          transform: translateX(50%);
        }
      }

      @keyframes adLoader {
        from {
          transform: translateX(-18%);
        }
        to {
          transform: translateX(156%);
        }
      }

      @keyframes sceneTagIn {
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .player-chrome {
        position: absolute;
        inset: 0;
        z-index: 5;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 0 clamp(24px, 2.25vw, 42px) clamp(20px, 1.72vw, 32px);
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0) 0%,
          rgba(0, 0, 0, 0) 62%,
          rgba(0, 0, 0, 0.72) 100%
        );
      }

      .time-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: clamp(6px, 0.54vw, 10px);
        font-size: clamp(18px, 1.72vw, 32px);
        line-height: 1;
        font-weight: 800;
        letter-spacing: 0;
      }

      .timeline {
        position: relative;
        height: clamp(6px, 0.54vw, 10px);
        margin-bottom: clamp(24px, 2.15vw, 40px);
      }

      .timeline input {
        position: absolute;
        inset: -8px 0;
        width: 100%;
        opacity: 0;
        cursor: pointer;
      }

      .timeline-track {
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: clamp(4px, 0.38vw, 7px);
        transform: translateY(-50%);
        overflow: hidden;
        border-radius: 99px;
        background: var(--track);
      }

      .timeline-fill {
        display: block;
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: var(--track-active);
      }

      .ad-cue {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 3px;
        height: 13px;
        border-radius: 99px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.24);
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .controls-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: calc(54px * var(--control-scale));
        gap: clamp(16px, 1.5vw, 28px);
      }

      .left-controls,
      .right-controls {
        display: flex;
        align-items: center;
        gap: clamp(17px, 1.5vw, 28px);
      }

      .right-controls {
        gap: clamp(18px, 1.6vw, 30px);
      }

      .icon-button {
        position: relative;
        display: inline-grid;
        width: 40px;
        height: 40px;
        place-items: center;
        color: var(--white);
        opacity: 0.98;
        transform: scale(var(--control-scale));
        transform-origin: center;
      }

      .icon-button:focus-visible,
      .text-button:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.92);
        outline-offset: 5px;
        border-radius: 8px;
      }

      .play-icon {
        width: 0;
        height: 0;
        margin-left: 4px;
        border-top: 16px solid transparent;
        border-bottom: 16px solid transparent;
        border-left: 31px solid var(--white);
        filter: drop-shadow(0 0 1px rgba(255, 255, 255, 0.2));
      }

      .pause-icon {
        position: relative;
        width: 31px;
        height: 31px;
        opacity: 0.45;
      }

      .pause-icon::before,
      .pause-icon::after {
        content: "";
        position: absolute;
        top: 2px;
        width: 8px;
        height: 28px;
        border-radius: 8px;
        background: var(--white);
      }

      .pause-icon::before {
        left: 5px;
      }

      .pause-icon::after {
        right: 5px;
      }

      .next-icon {
        position: relative;
        width: 38px;
        height: 32px;
        opacity: 0.45;
      }

      .next-icon::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 0;
        height: 0;
        border-top: 16px solid transparent;
        border-bottom: 16px solid transparent;
        border-left: 27px solid var(--white);
      }

      .next-icon::after {
        content: "";
        position: absolute;
        right: 0;
        top: 3px;
        width: 6px;
        height: 26px;
        border-radius: 8px;
        background: var(--white);
      }

      .text-button {
        min-width: 58px;
        height: 44px;
        color: var(--white);
        font-size: clamp(18px, 1.66vw, 31px);
        font-weight: 800;
        line-height: 44px;
        text-align: center;
        white-space: nowrap;
      }

      .settings-svg {
        width: 39px;
        height: 39px;
        overflow: visible;
      }

      .mini-icon {
        position: relative;
        width: 47px;
        height: 34px;
        border: 4px solid var(--white);
        border-radius: 8px;
      }

      .mini-icon::before,
      .mini-icon::after {
        content: "";
        position: absolute;
        top: 12px;
        width: 9px;
        height: 9px;
        border-color: var(--white);
        border-style: solid;
        transform: rotate(45deg);
      }

      .mini-icon::before {
        left: 12px;
        border-width: 0 0 4px 4px;
      }

      .mini-icon::after {
        right: 12px;
        border-width: 4px 4px 0 0;
      }

      .fullscreen-icon {
        position: relative;
        width: 38px;
        height: 38px;
      }

      .fullscreen-icon::before,
      .fullscreen-icon::after,
      .fullscreen-icon i::before,
      .fullscreen-icon i::after {
        content: "";
        position: absolute;
        width: 10px;
        height: 10px;
        border-color: var(--white);
        border-style: solid;
      }

      .fullscreen-icon::before {
        left: 0;
        top: 0;
        border-width: 4px 0 0 4px;
        border-top-left-radius: 3px;
      }

      .fullscreen-icon::after {
        right: 0;
        top: 0;
        border-width: 4px 4px 0 0;
        border-top-right-radius: 3px;
      }

      .fullscreen-icon i::before {
        left: 0;
        bottom: 0;
        border-width: 0 0 4px 4px;
        border-bottom-left-radius: 3px;
      }

      .fullscreen-icon i::after {
        right: 0;
        bottom: 0;
        border-width: 0 4px 4px 0;
        border-bottom-right-radius: 3px;
      }

      .speed-wrap {
        position: relative;
      }

      .speed-menu {
        position: absolute;
        right: -8px;
        bottom: 58px;
        display: grid;
        min-width: 118px;
        padding: 8px;
        border-radius: 6px;
        background: var(--panel);
        box-shadow: 0 18px 38px rgba(0, 0, 0, 0.42);
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
        transition:
          opacity 0.16s ease,
          transform 0.16s ease;
      }

      .speed-wrap:hover .speed-menu,
      .speed-wrap:focus-within .speed-menu {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .speed-menu button {
        height: 36px;
        border-radius: 4px;
        color: rgba(255, 255, 255, 0.86);
        font-size: 16px;
        font-weight: 700;
      }

      .speed-menu button:hover,
      .speed-menu button.active {
        background: rgba(255, 255, 255, 0.14);
        color: #fff;
      }

      .tooltip {
        position: absolute;
        left: 50%;
        bottom: 58px;
        padding: 7px 10px;
        border-radius: 4px;
        background: var(--panel);
        color: rgba(255, 255, 255, 0.92);
        font-size: 14px;
        font-weight: 700;
        line-height: 1;
        white-space: nowrap;
        opacity: 0;
        transform: translate(-50%, 8px);
        pointer-events: none;
        transition:
          opacity 0.16s ease,
          transform 0.16s ease;
      }

      .icon-button:hover .tooltip,
      .text-button:hover .tooltip,
      .icon-button:focus-visible .tooltip,
      .text-button:focus-visible .tooltip {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      @media (max-width: 900px) {
        .player-shell {
          --control-scale: 0.58;
        }

        .ad-content {
          grid-template-columns: 1fr;
          align-content: center;
          padding: 38px 24px 104px;
        }

        .ad-step.active.ad-step-split {
          grid-template-columns: 1fr;
        }

        .ad-card {
          display: none;
        }

        .player-chrome {
          padding: 0 18px 22px;
        }

        .timeline {
          margin-bottom: 24px;
        }

        .left-controls,
        .right-controls {
          gap: 16px;
        }

        .controls-row {
          gap: 18px;
        }

        .text-button {
          min-width: 48px;
        }
      }

      @media (min-width: 901px) and (max-width: 1200px) {
        .player-shell {
          --control-scale: 0.64;
        }
      }

      @media (min-width: 1201px) and (max-width: 1500px) {
        .player-shell {
          --control-scale: 0.78;
        }
      }

      @media (max-width: 640px) {
        .controls-row {
          align-items: flex-start;
        }

        .right-controls {
          gap: 10px;
        }

        .settings-button {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="player-page">
      <section class="player-shell" id="playerShell" aria-label="腾讯视频播放器模拟页">
        <div class="video-layer">
          <video
            id="contentVideo"
            src="assets/kitchen-cooking-source.mp4"
            poster="assets/fresh-ingredients.jpg"
            preload="metadata"
            playsinline
          ></video>
        </div>

        <div class="ai-prehint" id="aiPrehint" aria-live="polite">
          <span class="ai-prehint-dot" aria-hidden="true"></span>
          <span>3 秒后进入剧情广告体验。</span>
        </div>

        <section class="ad-layer" id="adLayer" aria-label="AI 场景广告">
          <div class="ad-backdrop" aria-hidden="true"></div>
          <div class="ad-scan" aria-hidden="true"></div>
          <div class="ad-scene-tags" aria-hidden="true">
            <span class="scene-tag">识别剧情：番茄翻炒</span>
            <span class="scene-tag">识别动作：准备调味</span>
            <span class="scene-tag">AI 推荐：海天味极鲜</span>
          </div>
          <div class="ad-meta">
            <span class="ad-countdown" id="adCountdown">AI广告 10s</span>
            <button class="ad-skip" id="adSkipButton" type="button" disabled>广告播放中</button>
            <button class="ad-exit" id="adExitButton" type="button">退出广告</button>
          </div>
          <div class="ad-content">
            <div class="ad-step ad-step-split" data-ad-step="result">
              <div>
                <div class="ad-kicker">AI 剧情短片播放中</div>
                <h2 class="ad-title" id="adResultTitle">这锅番茄香气，AI 已经<span>配好下一餐</span></h2>
                <p class="ad-copy" id="adResultCopy">识别到家常烹饪、番茄风味和调味动作，为你生成“30 分钟送达”的同款食材包。</p>
                <div class="ad-detections" aria-hidden="true">
                  <span id="adTagOne">番茄底味</span>
                  <span id="adTagTwo">家庭厨房</span>
                  <span id="adTagThree">即时配送</span>
                </div>
              </div>
              <aside class="ad-card">
                <div class="ad-media">
                  <img class="ad-card-image" id="adCardImage" src="assets/fresh-ingredients.jpg" alt="" />
                  <video
                    class="ad-card-video"
                    id="adCardVideo"
                    src="assets/haitian-seasoning-ai-ad-clean-v5.webm"
                    muted
                    playsinline
                    preload="auto"
                  ></video>
                </div>
                <div class="ad-brand" id="adBrand">鲜食到家 x 腾讯视频</div>
                <div class="ad-product" id="adProduct">番茄浓汤食材包</div>
                <a class="ad-card-link" id="adCardLink" href="shopping-fresh-kit.html" aria-label="AI剧情广告">
                  <span class="ad-card-link-text">AI剧情广告</span>
                </a>
                <div class="ad-offer">
                  <div class="ad-price" id="adPrice">¥19.9</div>
                  <a class="ad-cta" id="adCta" href="shopping-fresh-kit.html">一键加入</a>
                </div>
              </aside>
            </div>

            <div class="ad-step ad-step-split" data-ad-step="end">
              <div class="ad-end">
                <div class="ad-kicker">广告短片已播放完成</div>
                <h2 class="ad-end-title" id="adEndTitle">已为你保留这份推荐</h2>
                <p class="ad-end-copy" id="adEndCopy">点击链接可查看同款食材包；也可以退出广告，继续观看正片。</p>
                <div class="ad-end-actions">
                  <a class="ad-link" id="adLink" href="https://v.qq.com" target="_blank" rel="noreferrer">查看推荐</a>
                  <button class="ad-secondary" id="adResumeButton" type="button">继续正片</button>
                </div>
              </div>
              <aside class="ad-card">
              <div class="ad-media">
                <img class="ad-card-image" id="adEndCardImage" src="assets/fresh-ingredients.jpg" alt="" />
              </div>
              <div class="ad-brand" id="adEndBrand">鲜食到家 x 腾讯视频</div>
              <div class="ad-product" id="adEndProduct">番茄浓汤食材包</div>
                <a class="ad-card-link" id="adEndCardLink" href="shopping-fresh-kit.html" aria-label="AI剧情广告">
                  <span class="ad-card-link-text">AI剧情广告</span>
                </a>
                <div class="ad-offer">
                <div class="ad-price" id="adEndPrice">¥19.9</div>
                <a class="ad-cta" id="adEndCta" href="shopping-fresh-kit.html">查看商品详情</a>
              </div>
              </aside>
            </div>
          </div>
        </section>

        <div class="player-chrome">
          <div class="time-row" aria-live="polite">
            <span id="currentTime">00:00</span>
            <span id="durationTime">00:00</span>
          </div>

          <div class="timeline">
            <div class="timeline-track" aria-hidden="true">
              <span class="timeline-fill" id="timelineFill"></span>
              <span class="ad-cue" aria-hidden="true"></span>
            </div>
            <input id="timelineInput" type="range" min="0" max="0" value="0" aria-label="播放进度" />
          </div>

          <div class="controls-row">
            <div class="left-controls">
              <button class="icon-button" id="playButton" type="button" aria-label="播放">
                <span class="play-icon" id="mainPlayIcon" aria-hidden="true"></span>
                <span class="tooltip" id="playTooltip">播放</span>
              </button>
              <button class="icon-button" id="nextButton" type="button" aria-label="下一集">
                <span class="next-icon" aria-hidden="true"></span>
                <span class="tooltip">下一集</span>
              </button>
            </div>

            <div class="right-controls">
              <div class="speed-wrap">
                <button class="text-button" id="speedButton" type="button" aria-label="倍速">倍速</button>
                <div class="speed-menu" aria-label="倍速选项">
                  <button type="button" data-speed="0.75">0.75x</button>
                  <button type="button" data-speed="1" class="active">1.0x</button>
                  <button type="button" data-speed="1.25">1.25x</button>
                  <button type="button" data-speed="1.5">1.5x</button>
                  <button type="button" data-speed="2">2.0x</button>
                </div>
              </div>

              <button class="icon-button settings-button" type="button" aria-label="设置">
                <svg class="settings-svg" viewBox="0 0 48 48" aria-hidden="true">
                  <path
                    d="M24 4 30.1 9.1 38.2 8.7 41.1 16.2 47 21.7 43.9 29.2 44.4 37.2 36.7 40.1 31.4 46 24 42.8 16.6 46 11.3 40.1 3.6 37.2 4.1 29.2 1 21.7 6.9 16.2 9.8 8.7 17.9 9.1Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-linejoin="round"
                    stroke-width="5"
                  />
                  <circle cx="24" cy="24" r="6.5" fill="none" stroke="currentColor" stroke-width="5" />
                </svg>
                <span class="tooltip">设置</span>
              </button>
              <button class="icon-button" type="button" aria-label="小窗播放">
                <span class="mini-icon" aria-hidden="true"></span>
                <span class="tooltip">小窗</span>
              </button>
              <button class="icon-button" id="fullscreenButton" type="button" aria-label="全屏">
                <span class="fullscreen-icon" aria-hidden="true"><i></i></span>
                <span class="tooltip">全屏</span>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const clipDuration = 10;
      const adInsertAt = 5;
      const adResumeAt = 5.08;
      const adPreviewAt = 2;
      const adShortMs = 10000;
      let adHasPlayed = false;
      let adPlaying = false;
      let adStartedAt = 0;
      let adTimerId = null;
      let prehintShown = false;
      let adChoice = "fresh";
      let adPhase = "idle";
      let adPhaseTimerId = null;
      let activeAdDuration = adShortMs;

      const playerShell = document.querySelector("#playerShell");
      const contentVideo = document.querySelector("#contentVideo");
      const aiPrehint = document.querySelector("#aiPrehint");
      const adLayer = document.querySelector("#adLayer");
      const adCountdown = document.querySelector("#adCountdown");
      const adSkipButton = document.querySelector("#adSkipButton");
      const adExitButton = document.querySelector("#adExitButton");
      const adResumeButton = document.querySelector("#adResumeButton");
      const adStepNodes = document.querySelectorAll("[data-ad-step]");
      const adResultTitle = document.querySelector("#adResultTitle");
      const adResultCopy = document.querySelector("#adResultCopy");
      const adBrand = document.querySelector("#adBrand");
      const adProduct = document.querySelector("#adProduct");
      const adPrice = document.querySelector("#adPrice");
      const adCta = document.querySelector("#adCta");
      const adCardLink = document.querySelector("#adCardLink");
      const adCard = document.querySelector("[data-ad-step='result'] .ad-card");
      const adCardImage = document.querySelector("#adCardImage");
      const adCardVideo = document.querySelector("#adCardVideo");
      const adTagOne = document.querySelector("#adTagOne");
      const adTagTwo = document.querySelector("#adTagTwo");
      const adTagThree = document.querySelector("#adTagThree");
      const adEndTitle = document.querySelector("#adEndTitle");
      const adEndCopy = document.querySelector("#adEndCopy");
      const adEndBrand = document.querySelector("#adEndBrand");
      const adEndProduct = document.querySelector("#adEndProduct");
      const adEndPrice = document.querySelector("#adEndPrice");
      const adEndCta = document.querySelector("#adEndCta");
      const adEndCardLink = document.querySelector("#adEndCardLink");
      const adEndCardImage = document.querySelector("#adEndCardImage");
      const adLink = document.querySelector("#adLink");
      const currentTime = document.querySelector("#currentTime");
      const durationTime = document.querySelector("#durationTime");
      const timelineInput = document.querySelector("#timelineInput");
      const timelineFill = document.querySelector("#timelineFill");
      const adCue = document.querySelector(".ad-cue");
      const playButton = document.querySelector("#playButton");
      const playIcon = document.querySelector("#mainPlayIcon");
      const playTooltip = document.querySelector("#playTooltip");
      const speedButtons = document.querySelectorAll("[data-speed]");
      const fullscreenButton = document.querySelector("#fullscreenButton");
      const urlParams = new URLSearchParams(window.location.search);
      const shouldResumeAfterAdReturn = urlParams.get("adReturn") === "1";
      const adVariants = {
        fresh: {
          keyword: "提鲜方案",
          generatingCopy: "AI 正在把番茄底味、调味动作与调味品牌卖点匹配。",
          title: "想更鲜一点？AI 给这锅菜<span>补一勺灵魂</span>",
          copy: "根据当前烹饪动作生成调味组合：番茄浓汤底 + 鲜味酱汁 + 香草点缀。",
          brand: "海天味极鲜 x 腾讯视频",
          product: "番茄提鲜调味组合",
          price: "¥12.9",
          cta: "一键购买",
          tags: ["番茄锅", "味极鲜", "海天调味"],
          endTitle: "海天提鲜方案已生成",
          endCopy: "点击可查看同款味极鲜调味组合；退出广告后继续从剧情原点播放。",
          link: "shopping-seasoning-kit.html",
          image: "assets/haitian-seasoning-ad-keyvisual.png",
          video: "assets/haitian-seasoning-ai-ad-clean-v5.webm",
          videoAd: true,
          duration: adShortMs
        },
        easy: {
          keyword: "省事方案",
          generatingCopy: "AI 正在把家庭厨房、即时配送和一键下单链路组合成广告。",
          title: "想更省事？AI 已经<span>配好下一餐</span>",
          copy: "识别到家常烹饪、番茄风味和调味动作，为你生成“30 分钟送达”的同款食材包。",
          brand: "鲜食到家 x 腾讯视频",
          product: "番茄浓汤食材包",
          price: "¥19.9",
          cta: "一键加入",
          tags: ["家庭厨房", "即时配送", "食材包"],
          endTitle: "食材包已为你保留",
          endCopy: "点击可查看同款食材包；退出广告后继续从剧情原点播放。",
          link: "shopping-fresh-kit.html",
          image: "assets/fresh-ingredients.jpg",
          video: "",
          duration: adShortMs
        }
      };

      function pad(value) {
        return String(Math.floor(value)).padStart(2, "0");
      }

      function formatTime(seconds) {
        const safeSeconds = Number.isFinite(seconds) ? Math.max(0, seconds) : 0;
        const mins = Math.floor(safeSeconds / 60);
        const secs = Math.floor(safeSeconds % 60);
        return `${pad(mins)}:${pad(secs)}`;
      }

      function getPlayableDuration() {
        if (!Number.isFinite(contentVideo.duration) || contentVideo.duration <= 0) {
          return clipDuration;
        }

        return Math.min(clipDuration, contentVideo.duration);
      }

      function render() {
        const duration = getPlayableDuration();
        const current = Math.min(contentVideo.currentTime, duration);
        currentTime.textContent = formatTime(current);
        durationTime.textContent = formatTime(duration);
        timelineInput.max = duration;
        timelineInput.value = current;
        const progress = duration === 0 ? 0 : (current / duration) * 100;
        timelineFill.style.width = `${progress}%`;
        adCue.style.left = `${(adInsertAt / duration) * 100}%`;
        playButton.setAttribute("aria-label", contentVideo.paused ? "播放" : "暂停");
        playTooltip.textContent = contentVideo.paused ? "播放" : "暂停";
        playIcon.className = contentVideo.paused ? "play-icon" : "pause-icon";
      }

      function resetAdTrigger() {
        adHasPlayed = false;
        prehintShown = false;
        aiPrehint.classList.remove("active");
      }

      function syncAdTriggerState() {
        if (adPlaying) return;

        if (contentVideo.currentTime < adInsertAt) {
          resetAdTrigger();
        }
      }

      function checkAdCue() {
        if (adPlaying) return true;

        if (!prehintShown && !adHasPlayed && contentVideo.currentTime >= adPreviewAt) {
          prehintShown = true;
          aiPrehint.classList.add("active");
        }

        if (!adHasPlayed && contentVideo.currentTime >= adInsertAt) {
          startAd();
          return true;
        }

        return false;
      }

      function resumeAfterExternalAd() {
        adHasPlayed = true;
        prehintShown = true;
        aiPrehint.classList.remove("active");
        contentVideo.currentTime = Math.min(adResumeAt, getPlayableDuration());
        render();

        contentVideo.play().catch(() => {
          render();
        });

        const cleanUrl = `${window.location.pathname}${window.location.hash}`;
        window.history.replaceState(null, "", cleanUrl);
      }

      function initializePlayer() {
        if (shouldResumeAfterAdReturn) {
          resumeAfterExternalAd();
          return;
        }

        render();
      }

      async function togglePlayback() {
        if (adPlaying) return;

        if (contentVideo.currentTime >= getPlayableDuration()) {
          contentVideo.currentTime = 0;
          resetAdTrigger();
        }

        if (contentVideo.paused) {
          await contentVideo.play();
        } else {
          contentVideo.pause();
        }

        render();
      }

      playButton.addEventListener("click", togglePlayback);

      contentVideo.addEventListener("click", togglePlayback);

      timelineInput.addEventListener("input", (event) => {
        if (adPlaying) return;

        contentVideo.currentTime = Math.min(Number(event.target.value), getPlayableDuration());
        syncAdTriggerState();
        render();
        checkAdCue();
      });

      speedButtons.forEach((button) => {
        button.addEventListener("click", () => {
          contentVideo.playbackRate = Number(button.dataset.speed);
          speedButtons.forEach((item) => item.classList.toggle("active", item === button));
        });
      });

      document.querySelector("#nextButton").addEventListener("click", () => {
        contentVideo.pause();
        contentVideo.currentTime = 0;
        resetAdTrigger();
        endAd();
        render();
      });

      function setAdStep(step) {
        adPhase = step;
        adStepNodes.forEach((node) => {
          node.classList.toggle("active", node.dataset.adStep === step);
        });
        adLayer.classList.toggle("end-state", step === "end");
        adLayer.classList.toggle("scanning", step === "choice");

        if (step === "result" && adVariants[adChoice]?.videoAd) {
          playAdShort();
        } else {
          pauseAdShort();
        }
      }

      function showAdShort() {
        const variant = applyAdVariant(adChoice);
        activeAdDuration = variant.duration || adShortMs;
        adStartedAt = Date.now();
        setAdStep("result");
        renderAd();
      }

      function applyAdVariant(choice) {
        const variant = adVariants[choice] || adVariants.easy;
        adChoice = choice;

        adResultTitle.innerHTML = variant.title;
        adResultCopy.textContent = variant.copy;
        adBrand.textContent = variant.brand;
        adProduct.textContent = variant.product;
        adPrice.textContent = variant.price;
        adCta.textContent = variant.cta;
        adCta.href = variant.link;
        adCardLink.href = variant.link;
        adCardImage.src = variant.image;
        adCardVideo.src = variant.video || "";
        adCard.classList.toggle("video-mode", Boolean(variant.videoAd));
        [adTagOne, adTagTwo, adTagThree].forEach((node, index) => {
          node.textContent = variant.tags[index];
        });
        adEndTitle.textContent = variant.endTitle;
        adEndCopy.textContent = variant.endCopy;
        adEndBrand.textContent = variant.brand;
        adEndProduct.textContent = variant.product;
        adEndPrice.textContent = variant.price;
        adEndCta.href = variant.link;
        adEndCardLink.href = variant.link;
        adEndCardImage.src = variant.image;
        adLink.href = variant.link;
        adLink.textContent = choice === "fresh" ? "查看调味组合" : "查看食材包";
        activeAdDuration = variant.duration || adShortMs;

        return variant;
      }

      function scheduleAdPhase(callback, delay) {
        window.clearTimeout(adPhaseTimerId);
        adPhaseTimerId = window.setTimeout(callback, delay);
      }

      function playAdShort() {
        adCardVideo.currentTime = 0;
        adCardVideo.play().catch(() => {});
      }

      function pauseAdShort() {
        adCardVideo.pause();
      }

      function renderAd() {
        const elapsed = Math.min(activeAdDuration / 1000, (Date.now() - adStartedAt) / 1000);
        const remaining = Math.max(0, Math.ceil(activeAdDuration / 1000 - elapsed));

        adCountdown.textContent = `AI广告 ${remaining}s`;
        adSkipButton.disabled = adPhase !== "end";
        adSkipButton.textContent = adPhase === "end" ? "继续正片" : "广告播放中";

        if (elapsed >= activeAdDuration / 1000) {
          showAdEnd();
        }
      }

      function showAdEnd() {
        if (!adPlaying || adPhase === "end") return;

        window.clearInterval(adTimerId);
        adTimerId = null;
        pauseAdShort();
        setAdStep("end");
        adCountdown.textContent = "广告已结束";
        adSkipButton.disabled = false;
        adSkipButton.textContent = "继续正片";
      }

      function startAd() {
        if (adHasPlayed || adPlaying) return;

        adHasPlayed = true;
        adPlaying = true;
        contentVideo.pause();
        contentVideo.currentTime = adInsertAt;
        adStartedAt = Date.now();
        aiPrehint.classList.remove("active");
        playerShell.classList.add("ad-mode");
        adLayer.classList.add("active");
        applyAdVariant(adChoice);
        showAdShort();
        adTimerId = window.setInterval(renderAd, 200);
      }

      function endAd(shouldResume = false) {
        if (!adPlaying) return;

        adPlaying = false;
        window.clearInterval(adTimerId);
        window.clearTimeout(adPhaseTimerId);
        pauseAdShort();
        adTimerId = null;
        adPhaseTimerId = null;
        setAdStep("result");
        adLayer.classList.remove("active");
        adLayer.classList.remove("end-state");
        playerShell.classList.remove("ad-mode");
        aiPrehint.classList.remove("active");
        render();

        if (shouldResume) {
          contentVideo.play();
        }
      }

      adSkipButton.addEventListener("click", () => {
        if (!adSkipButton.disabled) {
          endAd(true);
        }
      });

      adExitButton.addEventListener("click", () => endAd(true));

      adResumeButton.addEventListener("click", () => endAd(true));

      fullscreenButton.addEventListener("click", async () => {
        if (!document.fullscreenElement) {
          await playerShell.requestFullscreen?.();
        } else {
          await document.exitFullscreen?.();
        }
      });

      contentVideo.addEventListener("loadedmetadata", initializePlayer, { once: true });
      contentVideo.addEventListener("play", () => {
        if (!checkAdCue()) {
          render();
        }
      });
      contentVideo.addEventListener("pause", render);
      contentVideo.addEventListener("seeked", () => {
        syncAdTriggerState();
        if (!checkAdCue()) {
          render();
        }
      });
      contentVideo.addEventListener("timeupdate", () => {
        const duration = getPlayableDuration();
        if (checkAdCue()) {
          return;
        }

        if (contentVideo.currentTime >= duration) {
          contentVideo.currentTime = duration;
          contentVideo.pause();
        }
        render();
      });

      if (contentVideo.readyState >= 1) {
        initializePlayer();
      } else {
        render();
      }
    </script>
  </body>
</html>
